# game_overrides.conf — per-gra overrides dla Proton/Wine
# Współtworzone przez community — każdy może dodać swoje fixy!
#
# Format:  AppID:KLUCZ=WARTOŚĆ
# Wiele override'ów dla jednej gry — każdy w osobnej linii z tym samym AppID
#
# Specjalne klucze projektu deck:
#   DECK_GAMESCOPE=WxH@FPS[:fsr|nis]  — uruchom przez Gamescope
#   DECK_CPU_CORES=N                  — ogranicz do N rdzeni CPU
#
# ── Cutsceny (Media Foundation / Bink) ──────────────────────────────────────
#   PROTON_ENABLE_MFPLAT=1            — filmy .mp4/.wmv przez MF API
#   PROTON_USE_WINED3D=1              — fallback wineD3D (DX8/DX9)
#   WINEDLLOVERRIDES=binkw32=n,b      — Bink video (stare gry)
#
# ── Audio ────────────────────────────────────────────────────────────────────
#   WINEDLLOVERRIDES=xaudio2_7=n,b   — XAudio2 crash fix
#   WINEDLLOVERRIDES=mss32=n,b       — Miles Sound System
#   PULSE_LATENCY_MSEC=60            — crackling/stuttery audio
#
# ── Wydajność ────────────────────────────────────────────────────────────────
#   WINE_LARGE_ADDRESS_AWARE=1       — 32-bit gry >2GB RAM
#   DXVK_ASYNC=1                     — async shader compilation
#   PROTON_HEAP_DELAY_FREE=1         — fix use-after-free crashe
#
# ════════════════════════════════════════════════════════════════════════════
# ── SOULS / FROMSOFTWARE ────────────────────────────────────────────────────
# ════════════════════════════════════════════════════════════════════════════

# Elden Ring (1245620) — Platinum na ProtonDB, działa świetnie
1245620:PROTON_HEAP_DELAY_FREE=1
1245620:WINEDLLOVERRIDES=d3dcompiler_47=n

# Dark Souls III (374320)
374320:PROTON_ENABLE_MFPLAT=1
374320:PROTON_HEAP_DELAY_FREE=1

# Dark Souls Remastered (570940)
570940:PROTON_ENABLE_MFPLAT=1

# Sekiro: Shadows Die Twice (814380)
814380:PROTON_HEAP_DELAY_FREE=1
814380:PROTON_ENABLE_MFPLAT=1

# Armored Core VI (1888160)
1888160:PROTON_HEAP_DELAY_FREE=1
1888160:VKD3D_CONFIG=dxr

